<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover lets content reach notch/rounded-corner areas on Samsung -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#181826">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Iso Sprite Studio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ══════════════════════════════════════════
       TOP TOOLBAR
       ══════════════════════════════════════════ -->
  <header id="toolbar">

    <div class="toolbar-group" id="tg-file">
      <button id="btn-new"    class="tb-btn" title="New sheet">New</button>
      <button id="btn-import" class="tb-btn" title="Import image (Ctrl+O)">Import</button>
      <input  type="file" id="file-input" accept="image/*" style="display:none">
      <button id="btn-export" class="tb-btn" title="Export PNG (Ctrl+S)">Export</button>
    </div>

    <div class="toolbar-sep"></div>

    <div class="toolbar-group" id="tg-canvas">
      <label class="tb-label">Canvas</label>
      <input type="number" id="canvas-w" value="512" min="64" max="4096" title="Sheet width (px)">
      <span class="tb-x">×</span>
      <input type="number" id="canvas-h" value="512" min="64" max="4096" title="Sheet height (px)">
      <button id="btn-apply-canvas" class="tb-btn">Apply</button>
    </div>

    <div class="toolbar-sep desktop-only"></div>

    <div class="toolbar-group desktop-only" id="tg-tiles">
      <label class="tb-label">Tile</label>
      <input type="number" id="tile-w" value="64" min="8" max="512" title="Tile width (px)">
      <span class="tb-x">×</span>
      <input type="number" id="tile-h" value="64" min="8" max="512" title="Tile height (px)">
      <span class="tb-pipe">|</span>
      <input type="number" id="tiles-x" value="4" min="1" max="64" title="Columns">
      <label class="tb-unit">cols</label>
      <input type="number" id="tiles-y" value="4" min="1" max="64" title="Rows">
      <label class="tb-unit">rows</label>
      <button id="btn-apply-tiles" class="tb-btn">Apply</button>
    </div>

    <div class="toolbar-sep desktop-only"></div>

    <!-- ISO Diamond toggle – always visible -->
    <div class="toolbar-group" id="tg-iso">
      <label class="toggle-wrap" title="Show isometric floor diamond guide">
        <input type="checkbox" id="toggle-iso">
        <span class="toggle-slider"></span>
        <span class="toggle-text">ISO◇</span>
      </label>
      <input type="number" id="diamond-w" value="64" min="8" max="512" title="Diamond width" class="diamond-input">
      <span class="tb-x">×</span>
      <input type="number" id="diamond-h" value="32" min="4" max="256" title="Diamond height" class="diamond-input">
    </div>

    <div class="toolbar-sep"></div>

    <div class="toolbar-group" id="tg-hist">
      <button id="btn-undo" class="tb-btn icon-btn" title="Undo (Ctrl+Z)">↩</button>
      <button id="btn-redo" class="tb-btn icon-btn" title="Redo (Ctrl+Shift+Z)">↪</button>
    </div>

    <div class="toolbar-sep desktop-only"></div>

    <div class="toolbar-group desktop-only" id="tg-zoom">
      <button id="btn-zoom-out" class="tb-btn icon-btn" title="Zoom out">−</button>
      <span id="zoom-label">100%</span>
      <button id="btn-zoom-in"  class="tb-btn icon-btn" title="Zoom in">+</button>
      <button id="btn-zoom-fit" class="tb-btn" title="Fit to window">Fit</button>
    </div>

    <!-- S Pen pressure bar (hidden until S Pen detected) -->
    <div id="pen-indicator" class="pen-indicator hidden" title="S Pen pressure">
      <span class="pen-icon">✒</span>
      <div class="pen-bar-track"><div id="pen-bar" class="pen-bar"></div></div>
    </div>

  </header>

  <!-- ══════════════════════════════════════════
       MAIN AREA
       ══════════════════════════════════════════ -->
  <div id="main-area">

    <!-- ── Left tools panel (desktop / tablet landscape) ── -->
    <aside id="tools-panel">
      <div class="tool-group">
        <button class="tool-btn active" data-tool="pencil"     title="Pencil (P)">
          <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.46a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          <span class="tool-label">Pencil</span>
        </button>
        <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
          <svg viewBox="0 0 24 24"><path d="M15.14 3a1 1 0 00-.71.3L2.3 15.44a1 1 0 000 1.41L5.09 20H20v-2H9.07l-1.24-1.24L17.56 7 15.14 3z"/></svg>
          <span class="tool-label">Eraser</span>
        </button>
        <button class="tool-btn" data-tool="fill" title="Fill (F)">
          <svg viewBox="0 0 24 24"><path d="M16.56 8.94L7.62 0 6.21 1.41l2.38 2.38-5.15 5.15c-.59.59-.59 1.54 0 2.12l5.5 5.5c.29.29.68.44 1.06.44s.77-.15 1.06-.44l5.5-5.5c.59-.58.59-1.53 0-2.12zM5.21 10 10 5.21 14.79 10H5.21zm11.35 6.5s-2 2.17-2 3.5c0 1.1.9 2 2 2s2-.9 2-2c0-1.33-2-3.5-2-3.5z"/></svg>
          <span class="tool-label">Fill</span>
        </button>
        <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)">
          <svg viewBox="0 0 24 24"><path d="M20.71 5.63l-2.34-2.34a1 1 0 00-1.41 0l-3.12 3.12-1.41-1.42-1.42 1.42 1.41 1.41L6.4 12.42A2 2 0 006 13.8V17h3.2a2 2 0 001.42-.59l6.6-6.6 1.41 1.42 1.42-1.42-1.42-1.41 3.12-3.12a1 1 0 000-1.65z"/></svg>
          <span class="tool-label">Pick</span>
        </button>
        <button class="tool-btn" data-tool="pivot" title="Pivot (V)">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="3" fill="currentColor"/><line x1="12" y1="2" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="22"/><line x1="2" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="22" y2="12"/></svg>
          <span class="tool-label">Pivot</span>
        </button>
        <button class="tool-btn" data-tool="select" title="Select (S)">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 2"/></svg>
          <span class="tool-label">Select</span>
        </button>
      </div>

      <div class="color-section">
        <div class="color-row">
          <div id="color-preview" title="Active color"></div>
          <input type="color" id="color-picker" value="#000000">
        </div>
        <div id="palette"></div>
      </div>

      <div class="brush-section">
        <div class="brush-row">
          <label class="side-label">Size</label>
          <span id="brush-size-val" class="brush-val">1</span>
        </div>
        <input type="range" id="brush-size" min="1" max="32" value="1">
      </div>

      <div class="brush-section">
        <div class="brush-row">
          <label class="side-label">Opacity</label>
          <span id="brush-opacity-val" class="brush-val">100%</span>
        </div>
        <input type="range" id="brush-opacity" min="1" max="100" value="100">
      </div>

      <!-- Pressure sensitivity mode (visible when S Pen in use) -->
      <div id="pen-settings" class="pen-settings hidden">
        <label class="side-label" style="margin-bottom:3px">✒ Pressure →</label>
        <select id="pressure-mode">
          <option value="opacity">Opacity</option>
          <option value="size">Brush Size</option>
          <option value="none">Off</option>
        </select>
      </div>

      <div class="grid-toggles">
        <label class="toggle-wrap small">
          <input type="checkbox" id="toggle-grid" checked>
          <span class="toggle-slider"></span>
          <span class="toggle-text">Grid</span>
        </label>
        <label class="toggle-wrap small">
          <input type="checkbox" id="toggle-snap" checked>
          <span class="toggle-slider"></span>
          <span class="toggle-text">Snap</span>
        </label>
        <label class="toggle-wrap small">
          <input type="checkbox" id="toggle-show-pivots" checked>
          <span class="toggle-slider"></span>
          <span class="toggle-text">Pivots</span>
        </label>
      </div>

      <div class="zoom-section desktop-only">
        <button id="btn-zoom-out2" class="tb-btn icon-btn">−</button>
        <span id="zoom-label2" class="zoom-lbl">100%</span>
        <button id="btn-zoom-in2"  class="tb-btn icon-btn">+</button>
      </div>
    </aside>

    <!-- ── Canvas viewport ── -->
    <div id="canvas-area">
      <div id="canvas-wrapper">
        <!-- Three composited canvases: checker < sprite < overlay -->
        <canvas id="checker-canvas"></canvas>
        <canvas id="sprite-canvas"></canvas>
        <canvas id="overlay-canvas"></canvas>
      </div>
    </div>

    <!-- ── Right properties panel (desktop) ── -->
    <aside id="props-panel">

      <!-- Tile config (mobile replaces desktop tg-tiles) -->
      <section class="prop-section mobile-only">
        <div class="prop-header" data-section="tile-cfg">
          <span>Tile Layout</span><span class="chevron">▾</span>
        </div>
        <div class="prop-body" id="sec-tile-cfg">
          <div class="prop-row">
            <label class="prop-label">Tile W</label>
            <input type="number" id="tile-w-m" value="64" min="8" max="512">
            <label class="prop-label">H</label>
            <input type="number" id="tile-h-m" value="64" min="8" max="512">
          </div>
          <div class="prop-row">
            <label class="prop-label">Cols</label>
            <input type="number" id="tiles-x-m" value="4" min="1" max="64">
            <label class="prop-label">Rows</label>
            <input type="number" id="tiles-y-m" value="4" min="1" max="64">
          </div>
          <button id="btn-apply-tiles-m" class="full-btn">Apply Layout</button>
        </div>
      </section>

      <!-- Pivot Points -->
      <section class="prop-section">
        <div class="prop-header" data-section="pivot">
          <span>Pivot Points</span><span class="chevron">▾</span>
        </div>
        <div class="prop-body" id="sec-pivot">
          <div class="prop-row">
            <label class="prop-label">Tile</label>
            <span id="pivot-tile-lbl" class="prop-val">–</span>
          </div>
          <div class="prop-row">
            <label class="prop-label">X</label>
            <input type="number" id="pivot-x" placeholder="–" min="0">
            <label class="prop-label" style="margin-left:6px">Y</label>
            <input type="number" id="pivot-y" placeholder="–" min="0">
          </div>
          <div class="prop-actions">
            <button id="btn-copy-pivot">Copy</button>
            <button id="btn-paste-all">Paste All</button>
            <button id="btn-paste-sel">Paste Sel.</button>
            <button id="btn-clear-pivot">Clear</button>
          </div>
        </div>
      </section>

      <!-- Background Removal -->
      <section class="prop-section">
        <div class="prop-header" data-section="bg">
          <span>BG Removal</span><span class="chevron">▾</span>
        </div>
        <div class="prop-body" id="sec-bg">
          <div class="prop-row">
            <label class="prop-label">Color</label>
            <input type="color" id="bg-color" value="#ffffff">
            <button id="btn-pick-bg" class="small-btn">Pick</button>
          </div>
          <div class="prop-row">
            <label class="prop-label">Tolerance</label>
            <input type="range" id="bg-tolerance" min="0" max="255" value="15" style="flex:1">
            <span id="bg-tol-lbl" class="prop-val">15</span>
          </div>
          <div class="prop-row">
            <label class="toggle-wrap small">
              <input type="checkbox" id="bg-scope-all">
              <span class="toggle-slider"></span>
              <span class="toggle-text">Whole sheet</span>
            </label>
          </div>
          <div class="prop-actions">
            <button id="btn-remove-bg">Remove BG</button>
            <button id="btn-remove-bg-corners">From Corners</button>
          </div>
        </div>
      </section>

      <!-- Post-Processing Effects -->
      <section class="prop-section">
        <div class="prop-header" data-section="fx">
          <span>Post-Processing</span>
          <label class="toggle-wrap small" style="margin-left:auto;margin-right:4px" onclick="event.stopPropagation()">
            <input type="checkbox" id="toggle-fx">
            <span class="toggle-slider"></span>
          </label>
          <span class="chevron">▾</span>
        </div>
        <div class="prop-body" id="sec-fx">
          <div class="fx-row">
            <label>Brightness</label>
            <input type="range" id="fx-brightness" min="-100" max="100" value="0">
            <span id="fx-brightness-lbl" class="prop-val">0</span>
          </div>
          <div class="fx-row">
            <label>Contrast</label>
            <input type="range" id="fx-contrast" min="-100" max="100" value="0">
            <span id="fx-contrast-lbl" class="prop-val">0</span>
          </div>
          <div class="fx-row">
            <label>Saturation</label>
            <input type="range" id="fx-saturation" min="-100" max="100" value="0">
            <span id="fx-saturation-lbl" class="prop-val">0</span>
          </div>
          <div class="fx-row">
            <label>Hue Shift</label>
            <input type="range" id="fx-hue" min="0" max="359" value="0">
            <span id="fx-hue-lbl" class="prop-val">0°</span>
          </div>
          <div class="fx-row outline-row">
            <label class="toggle-wrap small">
              <input type="checkbox" id="fx-outline">
              <span class="toggle-slider"></span>
              <span class="toggle-text">Outline</span>
            </label>
            <input type="color" id="fx-outline-color" value="#000000">
            <select id="fx-outline-size">
              <option value="1">1px</option>
              <option value="2">2px</option>
              <option value="3">3px</option>
            </select>
          </div>
          <div class="prop-actions">
            <button id="btn-fx-apply">Bake to Sheet</button>
            <button id="btn-fx-reset">Reset</button>
          </div>
        </div>
      </section>

      <!-- Tile Navigator -->
      <section class="prop-section">
        <div class="prop-header" data-section="tiles">
          <span>Tile Navigator</span><span class="chevron">▾</span>
        </div>
        <div class="prop-body" id="sec-tiles">
          <div id="tile-nav-grid"></div>
          <div class="prop-row" style="margin-top:6px">
            <label class="prop-label">Active</label>
            <span id="active-tile-lbl" class="prop-val">0, 0</span>
          </div>
        </div>
      </section>

    </aside>

  </div><!-- #main-area -->

  <!-- ══════════════════════════════════════════
       MOBILE BOTTOM BAR (quick-access strip)
       ══════════════════════════════════════════ -->
  <div id="mobile-bar" class="mobile-only">
    <!-- Quick tool icons -->
    <button class="mob-tool-btn active" data-tool="pencil" title="Pencil">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.46a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </button>
    <button class="mob-tool-btn" data-tool="eraser" title="Eraser">
      <svg viewBox="0 0 24 24"><path d="M15.14 3a1 1 0 00-.71.3L2.3 15.44a1 1 0 000 1.41L5.09 20H20v-2H9.07l-1.24-1.24L17.56 7 15.14 3z"/></svg>
    </button>
    <button class="mob-tool-btn" data-tool="fill" title="Fill">
      <svg viewBox="0 0 24 24"><path d="M16.56 8.94L7.62 0 6.21 1.41l2.38 2.38-5.15 5.15c-.59.59-.59 1.54 0 2.12l5.5 5.5c.29.29.68.44 1.06.44s.77-.15 1.06-.44l5.5-5.5c.59-.58.59-1.53 0-2.12zM5.21 10 10 5.21 14.79 10H5.21zm11.35 6.5s-2 2.17-2 3.5c0 1.1.9 2 2 2s2-.9 2-2c0-1.33-2-3.5-2-3.5z"/></svg>
    </button>
    <button class="mob-tool-btn" data-tool="eyedropper" title="Eyedropper">
      <svg viewBox="0 0 24 24"><path d="M20.71 5.63l-2.34-2.34a1 1 0 00-1.41 0l-3.12 3.12-1.41-1.42-1.42 1.42 1.41 1.41L6.4 12.42A2 2 0 006 13.8V17h3.2a2 2 0 001.42-.59l6.6-6.6 1.41 1.42 1.42-1.42-1.42-1.41 3.12-3.12a1 1 0 000-1.65z"/></svg>
    </button>
    <!-- Active color swatch -->
    <div id="mob-color" class="mob-color-swatch" title="Tap to open panels"></div>
    <!-- Undo / Redo -->
    <button id="mob-undo" class="mob-action-btn" title="Undo">↩</button>
    <button id="mob-redo" class="mob-action-btn" title="Redo">↪</button>
    <!-- Open drawer -->
    <button id="btn-drawer-open" class="mob-action-btn drawer-toggle" title="Tools & Settings">☰</button>
  </div>

  <!-- Backdrop: dims canvas when drawer is open; tap to close -->
  <div id="drawer-backdrop" class="mobile-only"></div>

  <!-- ══════════════════════════════════════════
       MOBILE BOTTOM DRAWER
       ══════════════════════════════════════════ -->
  <div id="mobile-drawer" class="mobile-only">
    <div id="drawer-handle" title="Drag to resize"></div>
    <div id="drawer-tabs">
      <button class="drawer-tab active" data-tab="tools">Tools</button>
      <button class="drawer-tab" data-tab="colors">Colors</button>
      <button class="drawer-tab" data-tab="layout">Layout</button>
      <button class="drawer-tab" data-tab="props">Effects</button>
    </div>
    <div id="drawer-body">

      <!-- Tools tab -->
      <div class="drawer-panel active" id="dtab-tools">
        <div class="drawer-tool-grid">
          <button class="drawer-tool active" data-tool="pencil">✏ Pencil</button>
          <button class="drawer-tool" data-tool="eraser">◻ Eraser</button>
          <button class="drawer-tool" data-tool="fill">🪣 Fill</button>
          <button class="drawer-tool" data-tool="eyedropper">💉 Pick</button>
          <button class="drawer-tool" data-tool="pivot">⊕ Pivot</button>
          <button class="drawer-tool" data-tool="select">⬚ Select</button>
        </div>
        <div class="drawer-row">
          <label>Brush Size <span id="d-brush-val">1</span></label>
          <input type="range" id="d-brush-size" min="1" max="32" value="1">
        </div>
        <div class="drawer-row">
          <label>Opacity <span id="d-opacity-val">100%</span></label>
          <input type="range" id="d-brush-opacity" min="1" max="100" value="100">
        </div>
        <div id="d-pen-row" class="drawer-row hidden">
          <label>✒ Pressure →</label>
          <select id="d-pressure-mode">
            <option value="opacity">Opacity</option>
            <option value="size">Brush Size</option>
            <option value="none">Off</option>
          </select>
        </div>
        <div class="drawer-row toggles-row">
          <label class="toggle-wrap small"><input type="checkbox" id="d-toggle-grid" checked><span class="toggle-slider"></span><span class="toggle-text">Grid</span></label>
          <label class="toggle-wrap small"><input type="checkbox" id="d-toggle-snap" checked><span class="toggle-slider"></span><span class="toggle-text">Snap</span></label>
          <label class="toggle-wrap small"><input type="checkbox" id="d-toggle-iso"><span class="toggle-slider"></span><span class="toggle-text">ISO◇</span></label>
        </div>
      </div>

      <!-- Colors tab -->
      <div class="drawer-panel" id="dtab-colors">
        <div class="drawer-color-header">
          <div id="d-color-preview" class="d-color-swatch"></div>
          <input type="color" id="d-color-picker" value="#000000">
          <span id="d-color-hex" class="prop-val">#000000</span>
        </div>
        <div id="d-palette" class="d-palette"></div>
      </div>

      <!-- Layout tab -->
      <div class="drawer-panel" id="dtab-layout">
        <div class="drawer-row">
          <label>Tile W</label><input type="number" id="d-tile-w" value="64" min="8" max="512">
          <label>H</label><input type="number" id="d-tile-h" value="64" min="8" max="512">
        </div>
        <div class="drawer-row">
          <label>Cols</label><input type="number" id="d-tiles-x" value="4" min="1" max="64">
          <label>Rows</label><input type="number" id="d-tiles-y" value="4" min="1" max="64">
        </div>
        <button id="d-btn-apply-tiles" class="full-btn">Apply Layout</button>
        <div class="drawer-row" style="margin-top:6px">
          <label>ISO◇ W</label><input type="number" id="d-diamond-w" value="64" min="8" max="512">
          <label>H</label><input type="number" id="d-diamond-h" value="32" min="4" max="256">
        </div>
        <div class="drawer-row">
          <label>Canvas W</label><input type="number" id="d-canvas-w" value="512" min="64" max="4096">
          <label>H</label><input type="number" id="d-canvas-h" value="512" min="64" max="4096">
        </div>
        <button id="d-btn-apply-canvas" class="full-btn">Apply Canvas Size</button>
      </div>

      <!-- Effects tab -->
      <div class="drawer-panel" id="dtab-props">
        <!-- Pivot -->
        <div class="drawer-subsection">
          <div class="drawer-sub-title">Pivot Points</div>
          <div class="drawer-row">
            <label>X</label><input type="number" id="d-pivot-x" placeholder="–" min="0">
            <label>Y</label><input type="number" id="d-pivot-y" placeholder="–" min="0">
          </div>
          <div class="drawer-row">
            <button id="d-btn-copy-pivot">Copy</button>
            <button id="d-btn-paste-all">Paste All</button>
            <button id="d-btn-clear-pivot">Clear</button>
          </div>
        </div>
        <!-- BG Removal -->
        <div class="drawer-subsection">
          <div class="drawer-sub-title">BG Removal</div>
          <div class="drawer-row">
            <label>Color</label><input type="color" id="d-bg-color" value="#ffffff">
            <label>Tol.</label><input type="number" id="d-bg-tol" value="15" min="0" max="255" style="width:50px">
          </div>
          <div class="drawer-row">
            <button id="d-btn-remove-bg">Remove BG</button>
            <button id="d-btn-remove-bg-corners">From Corners</button>
          </div>
        </div>
        <!-- Post FX -->
        <div class="drawer-subsection">
          <div class="drawer-sub-title">
            Post FX
            <label class="toggle-wrap small" style="margin-left:auto" onclick="event.stopPropagation()">
              <input type="checkbox" id="d-toggle-fx"><span class="toggle-slider"></span><span class="toggle-text">On</span>
            </label>
          </div>
          <div class="fx-row"><label>Bright</label><input type="range" id="d-fx-brightness" min="-100" max="100" value="0"><span id="d-fx-b-lbl" class="prop-val">0</span></div>
          <div class="fx-row"><label>Contrast</label><input type="range" id="d-fx-contrast" min="-100" max="100" value="0"><span id="d-fx-c-lbl" class="prop-val">0</span></div>
          <div class="fx-row"><label>Sat.</label><input type="range" id="d-fx-saturation" min="-100" max="100" value="0"><span id="d-fx-s-lbl" class="prop-val">0</span></div>
          <div class="fx-row"><label>Hue</label><input type="range" id="d-fx-hue" min="0" max="359" value="0"><span id="d-fx-h-lbl" class="prop-val">0°</span></div>
          <div class="drawer-row">
            <button id="d-btn-fx-apply">Bake</button>
            <button id="d-btn-fx-reset">Reset</button>
          </div>
        </div>
      </div>

    </div><!-- #drawer-body -->
  </div><!-- #mobile-drawer -->

  <!-- ══════════════════════════════════════════
       STATUS BAR
       ══════════════════════════════════════════ -->
  <footer id="statusbar">
    <span id="st-tile">Tile 0,0</span>
    <span class="st-sep">│</span>
    <span id="st-pos">–</span>
    <span class="st-sep">│</span>
    <span id="st-color">–</span>
    <span class="st-sep">│</span>
    <span id="st-zoom">100%</span>
    <span class="st-sep desktop-only">│</span>
    <span id="st-pen" class="desktop-only">–</span>
  </footer>

  <script src="js/state.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/tools.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
